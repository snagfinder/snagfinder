<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/styles.css">
  <title>Submit BBQ - Snag Finder</title>
  <style>
    .page-content { max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #0d5c3d; }
    form div { margin-bottom: 15px; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; }
    button { background: #0d5c3d; color: white; border: none; padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <div class="title">Snag Finder</div>
    <div class="nav-links"><a href="index.html">Home</a><a href="submit.html">Submit BBQ</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
  </nav>

  <div class="page-content">
   <h1>Submit BBQ Info</h1>
  <p>Found a sizzle? Tell us about it!</p>
  <form id="bbqForm">
    <div>
      <label>State</label>
      <select id="stateSelect" onchange="populateStores()">
        <option value="">-- Select State --</option>
        <option value="NSW">NSW</option>
        <option value="VIC">VIC</option>
        <option value="QLD">QLD</option>
        <option value="WA">WA</option>
        <option value="SA">SA</option>
        <option value="TAS">TAS</option>
        <option value="NT">NT</option>
        <option value="ACT">ACT</option>
      </select>
    </div>

    <div>
      <label>Bunnings Store</label>
      <select id="storeSelect">
        <option value="">-- Select a State first --</option>
      </select>
    </div>

    <div>
      <label>Organisation Name</label>
      <input type="text" id="orgName" placeholder="e.g. Smith Family Primary P&C">
    </div>

    <div>
      <label>Time </label>
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="time" id="startTime" value="09:00"> to <input type="time" id="endTime" value="16:00">
      </div>
    </div>

    <button type="button" onclick="sendEmail()">Submit BBQ</button>
  </form>
</div>

<!-- 1. Load the data first -->
<script src="js/data.js"></script>

<!-- 2. One single script block for the logic -->
<script>
  function populateStores() {
    const stateSelect = document.getElementById('stateSelect');
    const storeSelect = document.getElementById('storeSelect');
    const selectedState = stateSelect.value;

    // Clear previous options
    storeSelect.innerHTML = '<option value="">-- Select Store --</option>';

    if (!selectedState) {
      storeSelect.innerHTML = '<option value="">-- Select a State first --</option>';
      return;
    }

    // Check if data is actually loaded
    if (typeof bunningsStores === 'undefined') {
      console.error("Data.js failed to load!");
      alert("Error: Could not load store data. Please check data.js for errors.");
      return;
    }

    // Filter and Sort
    const filtered = bunningsStores
      .filter(s => s.state === selectedState)
      .sort((a, b) => a.name.localeCompare(b.name));

    // Add stores to dropdown
    filtered.forEach(store => {
      const opt = document.createElement('option');
      opt.value = store.name;
      opt.textContent = store.name;
      storeSelect.appendChild(opt);
    });
  }

  function sendEmail() {
    const state = document.getElementById('stateSelect').value;
    const store = document.getElementById('storeSelect').value;
    const org = document.getElementById('orgName').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;

    if(!state || !store || !org) {
      alert("Please fill in all details!");
      return;
    }

    const subject = encodeURIComponent(`BBQ Submission: ${store}`);
    const body = encodeURIComponent(`State: ${state}\nStore: ${store}\nOrganisation: ${org}\nTime: ${start} to ${end}`);
    
    window.location.href = `mailto:snagfinder@gmail.com?subject=${subject}&body=${body}`;

    document.getElementById('bbqForm').innerHTML = `
      <div style="text-align:center; padding:20px; border:2px solid #0d5c3d; border-radius:10px;">
        <h2 style="color:#0d5c3d">Email Drafted!</h2>
        <p>Check your email app to send the details. Thanks for the tip-off!</p>
        <button onclick="window.location.href='index.html'">Back to Map</button>
      </div>`;
  }

  // Handle incoming links from the map
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    if(params.has('state')) {
      document.getElementById('stateSelect').value = params.get('state');
      populateStores(); 
      if(params.has('store')) {
        document.getElementById('storeSelect').value = decodeURIComponent(params.get('store'));
      }
    }
  };
</script>
</body>
</html>
